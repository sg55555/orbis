# .github/workflows/collect-instability.yml
name: collect-instability
on:
  # schedule無効化(2026-06-28・Claude APIクレジット節約)。手動更新のみ＝Actions UI/CLIのworkflow_dispatchで実行。
  # 復活させる場合は下記schedule 2行のコメントを外す。
  # schedule:
  #   - cron: '47 */2 * * *'    # 2時間毎:47（Vercel Hobbyデプロイ上限対策で毎時→2h・別オフセット・push直列はgroup collect）
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: collect              # 既存と共有して直列化（push 競合回避）
  cancel-in-progress: false
jobs:
  instability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: sg55555/orbis-data
          path: data/snapshots
          token: ${{ secrets.ORBIS_DATA_TOKEN }}
          persist-credentials: true
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: Collect instability
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m collectors.instability || echo "instability skipped"
      - name: Commit snapshots to orbis-data
        run: |
          cd data/snapshots
          git config user.name "orbis-bot"
          git config user.email "210495115+sg55555@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh [skip ci]"
            git pull --rebase origin main
            git push
          fi
