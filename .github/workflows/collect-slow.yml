name: collect-slow
on:
  schedule:
    # 気温/水温は変化が遅く、収集も重い（各 13/12 バッチ・25s スリープ＝1層 5分超）。
    # 高頻度の collect.yml から分離し、3時間毎に回す。:11 はオフセット（混雑回避）。
    - cron: '11 */3 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: collect            # collect.yml と共有 → 直列化し push 競合を防ぐ
  cancel-in-progress: false
jobs:
  collect-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: sg55555/orbis-data
          path: data/snapshots
          token: ${{ secrets.ORBIS_DATA_TOKEN }}
          persist-credentials: true
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: Collect air temperature
        run: python -m collectors.airtemp || echo "airtemp skipped"
      - name: Collect sea surface temperature
        run: python -m collectors.sst || echo "sst skipped"
      - name: Commit snapshots to orbis-data
        run: |
          cd data/snapshots
          git config user.name "orbis-bot"
          git config user.email "210495115+sg55555@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh [skip ci]"
            git pull --rebase origin main
            git push
          fi
