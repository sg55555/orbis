name: collect-slow
on:
  schedule:
    # 気温/水温は変化が遅く、収集も重い（各 13/12 バッチ・25s スリープ＝1層 5分超）。
    # 高頻度の collect.yml から分離し、3時間毎に回す。:11 はオフセット（混雑回避）。
    - cron: '11 */3 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: collect            # collect.yml と共有 → 直列化し push 競合を防ぐ
  cancel-in-progress: false
jobs:
  collect-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: Collect air temperature
        run: python -m collectors.airtemp || echo "airtemp skipped"
      - name: Collect sea surface temperature
        run: python -m collectors.sst || echo "sst skipped"
      - name: Commit snapshots
        run: |
          git config user.name "orbis-bot"
          git config user.email "210495115+sg55555@users.noreply.github.com"
          git add data/snapshots/*.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh slow snapshots [skip ci]"
            git pull --rebase origin main   # collect との競合に備え push 前に取り込む
            git push
          fi
