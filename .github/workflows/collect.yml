name: collect
on:
  schedule:
    - cron: '*/15 * * * *'   # 15分毎（OpenSky匿名クレジット安全域＋GDELT更新間隔）
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: collect
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      - name: Collect quakes
        run: python -m collectors.quakes
      - name: Collect flights
        run: python -m collectors.flights || echo "flights skipped"
      - name: Collect GDELT events
        run: python -m collectors.gdelt_events || echo "gdelt skipped"
      - name: Collect air temperature
        run: python -m collectors.airtemp || echo "airtemp skipped"
      - name: Collect sea surface temperature
        run: python -m collectors.sst || echo "sst skipped"
      - name: Collect ships
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: python -m collectors.ships || echo "ships collect failed (see log above)"
      - name: Collect news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m collectors.news || echo "news skipped"
      - name: Commit snapshots
        run: |
          git config user.name "orbis-bot"
          git config user.email "210495115+sg55555@users.noreply.github.com"
          git add data/snapshots/*.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh snapshots [skip ci]"
            git push
          fi
