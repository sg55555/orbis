name: collect
on:
  schedule:
    # 15分間隔だが毎時オフセット（:07,:22,:37,:52）にして、:00/:15/:30/:45 の
    # 混雑スロットを避ける。GitHub Actions schedule は高負荷時に間引かれ実測 1.9〜5.1h に
    # なるため、オフセットで間引きを緩和する（恒久対策は外部dispatch・docs/scheduling.md 参照）。
    # 30分毎(:07,:37)。Vercel Hobby のデプロイ日次上限(~100/日)に対し、各データ commit が Vercel
    # デプロイを誘発するため cron 総数を抑制（collect 96→48・briefing/instability 各24→12・slow 8 ＝計 ~80/日）。
    # クライアント補間があるので 30分スナップショットでも near-realtime 感は維持。恒久策はデータ配信の Vercel 分離。
    - cron: '7,37 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: collect            # collect-slow.yml と共有 → リポジトリ全体で直列化し push 競合を防ぐ
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: sg55555/orbis-data
          path: data/snapshots
          token: ${{ secrets.ORBIS_DATA_TOKEN }}
          persist-credentials: true
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      # 各収集は失敗してもジョブを止めない（1ソースの障害で全層のコミットを失わない＝SPOF回避）。
      - name: Collect quakes
        run: python -m collectors.quakes || echo "quakes skipped"
      - name: Collect flights
        run: python -m collectors.flights || echo "flights skipped"
      - name: Collect GDELT events
        run: python -m collectors.gdelt_events || echo "gdelt skipped"
      - name: Collect ships
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: python -m collectors.ships || echo "ships collect failed (see log above)"
      - name: Collect news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m collectors.news || echo "news skipped"
      - name: Commit snapshots to orbis-data
        run: |
          cd data/snapshots
          git config user.name "orbis-bot"
          git config user.email "210495115+sg55555@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh [skip ci]"
            git pull --rebase origin main
            git push
          fi
