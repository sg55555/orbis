name: collect
on:
  schedule:
    # 15分間隔だが毎時オフセット（:07,:22,:37,:52）にして、:00/:15/:30/:45 の
    # 混雑スロットを避ける。GitHub Actions schedule は高負荷時に間引かれ実測 1.9〜5.1h に
    # なるため、オフセットで間引きを緩和する（恒久対策は外部dispatch・docs/scheduling.md 参照）。
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: collect            # collect-slow.yml と共有 → リポジトリ全体で直列化し push 競合を防ぐ
  cancel-in-progress: false
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install -r requirements.txt
      # 各収集は失敗してもジョブを止めない（1ソースの障害で全層のコミットを失わない＝SPOF回避）。
      - name: Collect quakes
        run: python -m collectors.quakes || echo "quakes skipped"
      - name: Collect flights
        run: python -m collectors.flights || echo "flights skipped"
      - name: Collect GDELT events
        run: python -m collectors.gdelt_events || echo "gdelt skipped"
      - name: Collect ships
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: python -m collectors.ships || echo "ships collect failed (see log above)"
      - name: Collect news
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m collectors.news || echo "news skipped"
      - name: Commit snapshots
        run: |
          git config user.name "orbis-bot"
          git config user.email "210495115+sg55555@users.noreply.github.com"
          git add data/snapshots/*.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh snapshots [skip ci]"
            git pull --rebase origin main   # collect-slow との競合に備え push 前に取り込む
            git push
          fi
