<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ORBIS — 世界リアルタイム監視</title>
  <meta name="theme-color" content="#05080f" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="css/orbis.css" />
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/deck.gl@9.3.4/dist.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="map-wrap">
      <canvas id="starfield"></canvas>
      <div id="map"></div>
      <div id="freshness">—</div>
      <div id="panel" class="side-panel">
        <div class="panel-head"><h4>レイヤー / Layers</h4>
          <button id="panel-toggle" class="collapse-btn" aria-label="パネル折りたたみ">‹</button></div>
        <div id="panel-rows"></div>
      </div>
      <div id="feed" class="side-panel feed-panel">
        <div class="panel-head"><h4>イベント / Feed</h4>
          <button id="feed-toggle" class="collapse-btn" aria-label="フィード折りたたみ">›</button></div>
        <div class="feed-hint">クリックでその地点へ移動 📍</div>
        <div id="feed-rows"></div>
      </div>
      <div id="streams" class="stream-bar collapsed">
        <div class="stream-head">
          <button id="streams-toggle" class="collapse-btn" aria-label="ライブ折りたたみ">🔴 LIVE</button>
          <span class="stream-now">—</span>
        </div>
        <div class="stream-body">
          <div class="stream-player">
            <iframe id="stream-frame" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>
          </div>
          <div id="stream-tabs" class="stream-tabs"></div>
        </div>
      </div>
      <div id="loading">
        <div class="boot">
          <div class="boot-rings"><span></span><span></span><span></span><i></i></div>
          <div class="boot-word">ORBIS</div>
          <div class="boot-sub">世界リアルタイム監視 — 起動中</div>
          <div class="boot-bar"><b></b></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
